<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu ảnh thẻ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
        }

        .search-section {
            margin-bottom: 40px;
        }

        .search-form {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .search-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
        }

        .search-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.3);
        }

        .search-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 20px;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .image-container {
            display: none;
            text-align: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .result-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .image-info {
            margin-bottom: 20px;
        }

        .image-id {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .image-title {
            font-size: 1rem;
            color: #666;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .download-btn {
            background: #27ae60;
            color: white;
        }

        .download-btn:hover {
            background: #219a52;
            transform: translateY(-2px);
        }

        .fullscreen-btn {
            background: #3498db;
            color: white;
        }

        .fullscreen-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .error-message {
            display: none;
            text-align: center;
            padding: 30px;
            background: #ffe6e6;
            border: 2px solid #ffcccc;
            border-radius: 12px;
            color: #d63031;
        }

        .error-text {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10001;
        }

        .close-modal:hover {
            color: #ccc;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .main-content {
                padding: 20px;
            }

            .search-form {
                flex-direction: column;
            }

            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-search"></i> TRA CỨU ẢNH THẺ</h1>
            <p>Tìm kiếm ảnh theo CCCD hoặc Mã Học Sinh</p>
        </div>

        <div class="main-content">
            <div class="search-section">
                <div class="search-form">
                    <input 
                        type="text" 
                        id="imageId" 
                        class="search-input" 
                        placeholder="Nhập CCCD hoặc Mã Học Sinh vào đây..."
                        autocomplete="off"
                    >
                    <button id="searchBtn" class="search-btn">
                        <i class="fas fa-search"></i> Tìm Kiếm
                    </button>
                </div>
            </div>

            <div id="resultSection" class="result-section">
                <div id="loadingSpinner" class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Đang tìm kiếm ảnh...</p>
                </div>

                <div id="imageContainer" class="image-container">
                    <img id="resultImage" class="result-image" alt="Kết quả tìm kiếm">
                    <div class="image-info">
                        <div id="imageIdDisplay" class="image-id"></div>
                        <div id="imageTitle" class="image-title"></div>
                    </div>
                    <div class="action-buttons">
                        <button id="downloadBtn" class="action-btn download-btn">
                            <i class="fas fa-download"></i> Tải xuống
                        </button>
                        <button id="fullscreenBtn" class="action-btn fullscreen-btn">
                            <i class="fas fa-expand"></i> Toàn màn hình
                        </button>
                    </div>
                </div>

                <div id="errorMessage" class="error-message">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p id="errorText">Có lỗi xảy ra</p>
                </div>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <span id="closeModal" class="close-modal">&times;</span>
        <img id="modalImage" class="modal-content" alt="Ảnh phóng to">
    </div>

    <script src="main.js"></script>
</body>
</html>
